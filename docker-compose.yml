version: '3.8'

services:
  p2proxy:
    image: bitping/p2proxy:latest
    container_name: p2proxy
    restart: unless-stopped
    ports:
      - "1080:1080"      # SOCKS5 proxy port
      - "45445:45445/udp" # P2P communication port
    volumes:
      - ./Config.yaml:/app/Config.yaml:ro
      - p2proxy_data:/app/data
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "pgrep", "p2proxy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  p2proxy_data: 