port: 45445

# Logging configuration
log_level: debug

servers:
  - protocol: Socks5
    port: 1080
    # Relaxed peer selection for better availability
    # country: AT  # Commented out to allow broader peer selection
    min_bandwidth: 50Mbps  # Reduced from 70Mbps for more peer options
    # destination_peer: /ip6/YOUR_IPV6_ADDR/udp/SOEMTHING/quic-v1/p2p/12D3KooWSAoUzgpG8fSgaHP6n4Nfqimj7RPX86ayrkTQeoTJtrsB
    pool:
      enabled: true
      min_idle: 5
      max_total: 30           # Increased from 20 to match Firefox defaults
      idle_timeout_secs: 60
      open_timeout_secs: 20   # Doubled from 10 for P2P network latency
      max_retries: 3          # New: Number of retries for failed requests
      health_check_timeout_secs: 5  # New: Timeout for peer health checks
      max_error_rate: 0.15    # New: Failover threshold (15% error rate)

