- name: Configure SSH and Cargo for GitLab
  run: |
    mkdir -p ~/.ssh ~/.cargo
    
    # Configure SSH to accept GitLab hosts without strict host checking
    cat >> ~/.ssh/config << EOF
    Host *.gitlab.com gitlab.com
        StrictHostKeyChecking no
        UserKnownHostsFile /dev/null
    EOF
    chmod 600 ~/.ssh/config
    
    # Configure Cargo to use Git CLI for all operations
    cat >> ~/.cargo/config.toml << EOF
    [net]
    git-fetch-with-cli = true
    EOF
    
    # Also set environment variable for immediate effect
    echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> $GITHUB_ENV

- name: Install build dependencies (Linux)
  if: runner.os == 'Linux'
  run: |
    sudo apt-get update
    sudo apt-get update
    # Install latest GCC (currently GCC 13)
    sudo apt-get install -y cmake gcc g++

- name: Rust Cache
  uses: Swatinem/rust-cache@v2
  with:
    prefix-key: "v1-rust"
    shared-key: "${{ matrix.target }}-build"
    cache-targets: "true"
    cache-on-failure: "true"
    cache-all-crates: "true"
    save-if: ${{ github.ref == 'refs/heads/master' }}
    workspaces: |
      . -> target

- name: Setup SSH Agent
  uses: webfactory/ssh-agent@v0.9.0
  with:
    ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }} 
