name: Publish Docker image

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Parse plan
        id: plan
        run: |
          # Extract the tag from the plan
          echo "Plan content for debugging:"
          echo '${{ inputs.plan }}' | jq .
          
          # Get the tag from the plan
          TAG=$(echo '${{ inputs.plan }}' | jq -r '.announcement_tag // empty')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            # Fallback: try to get version from releases
            TAG=$(echo '${{ inputs.plan }}' | jq -r '.releases[0].app_version // empty')
            if [ -n "$TAG" ] && [ "$TAG" != "null" ]; then
              TAG="v$TAG"
            fi
          fi
          
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Could not determine tag from plan"
            exit 1
          fi
          
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.plan.outputs.TAG }}

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITLAB_ACCESS_SSH_PRIVATE_KEY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            bitping/p2proxy:latest
            bitping/p2proxy:${{ steps.plan.outputs.TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max